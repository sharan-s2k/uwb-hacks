services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-civicfix}
      POSTGRES_USER: ${POSTGRES_USER:-civicfix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civicfix}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-civicfix}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-civicfix}:${POSTGRES_PASSWORD:-civicfix}@db:5432/${POSTGRES_DB:-civicfix}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma:2b}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
